    <main>
        <h1>BIENVENUE <br> SUR MON <br> CONVERTISSEUR</h1>

    <div class="converter">
        <input type="number" id="amount1" placeholder="Montant">

        <select id="currency1">
            <option value="EUR">Euro</option>
            <option value="USD">Dollar</option>
            <option value="GBP">Livre sterling</option>
            <option value="JPY">Yen</option>
        </select>

        <div class="swap" id="swap">↔</div>

        <input type="number" id="amount2" placeholder="Montant" disabled>

        <select id="currency2">
            <option value="EUR">Euro</option>
            <option value="USD">Dollar</option>
            <option value="GBP">Livre sterling</option>
            <option value="JPY">Yen</option>
        </select>
    </div>

    <button id="convert">convertir</button>

<script src="convertisseur.js"></script>
