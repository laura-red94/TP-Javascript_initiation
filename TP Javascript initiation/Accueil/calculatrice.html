<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Calculatrice</title>
<link rel="stylesheet" href="calculatrice.css">
</head>
<body>

    <!-- ---------------- HEADER FIXE ---------------- -->


    <header>
        <nav>
            <ul>
                <li><a href="accueil.html">ACCUEIL</a></li>
                <li><a href="convertisseur.html">CONVERTISSEUR DE DEVISE</a></li>
                <li><a href="facturation.html">FACTURATION</a></li>
                <li><a href="animations.html">ANIMATIONS</a></li>
            </ul>
        </nav>
    </header>

    <!-- ------------- CONTENU PRINCIPAL ------------- -->


    <main>
        <h1>BIENVENUE<br>SUR MA<br>CALCULATRICE</h1>
    </main>


    <div class="calc">
        <div id="display">0</div>

        <div class="row">
            <button class="btn c">C</button>
            <button class="btn op">%</button>
            <button class="btn op">/</button>
        </div>

        <div class="row">
            <button class="btn">7</button>
            <button class="btn">8</button>
            <button class="btn">9</button>
            <button class="btn op">x</button>
        </div>

        <div class="row">
            <button class="btn">4</button>
            <button class="btn">5</button>
            <button class="btn">6</button>
            <button class="btn op">-</button>
        </div>

        <div class="row">
            <button class="btn">1</button>
            <button class="btn">2</button>
            <button class="btn">3</button>
            <button class="btn op">+</button>
        </div>

        <div class="row">
            <button class="btn">0</button>
            <button class="btn">.</button>
            <button class="btn equal">=</button>
        </div>
    </div>

<script src="calculatrice.js"></script>

</body>
</html>
